name: Build NFC Terminal Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          # Remove pre-installed software to free ~60GB for the Buildroot build
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/local/graalvm \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/swift \
            /usr/local/.ghcup \
            /opt/az \
            /opt/microsoft \
            /usr/local/julia* \
            /usr/local/share/vcpkg \
            /usr/local/sqlpackage \
            /opt/pipx \
            /imagegeneration
          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get autopurge -y \
            aspnetcore-* dotnet-* google-cloud-cli azure-cli \
            microsoft-edge-stable google-chrome-stable firefox \
            mysql-* postgresql-* mono-* 2>/dev/null || true
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            cpio \
            unzip \
            rsync \
            bc \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-dev \
            python3-setuptools \
            file \
            dosfstools \
            mtools \
            fdisk \
            e2fsprogs

      - name: Clone Buildroot
        run: |
          git clone https://github.com/buildroot/buildroot.git --branch 2026.02.x --depth 1

      - name: Check disk space
        run: df -h /

      - name: Build image
        run: |
          set -o pipefail
          ./build.sh build --demo-app 2>&1 | tail -5000
        timeout-minutes: 120

      - name: Check build output
        if: always()
        run: |
          df -h /
          ls -lh buildroot/output/images/ 2>/dev/null || echo "No images directory found"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfc-terminal-image
          path: buildroot/output/images/nfc-terminal.img
          compression-level: 9

      - name: Compress image for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd buildroot/output/images
          gzip -k nfc-terminal.img
          sha256sum nfc-terminal.img.gz > nfc-terminal.img.gz.sha256

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            buildroot/output/images/nfc-terminal.img.gz
            buildroot/output/images/nfc-terminal.img.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
